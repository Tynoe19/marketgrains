services:
  - type: web
    name: marketgrains-api
    runtime: python
    rootDir: marketgrains_backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn marketgrains_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: marketgrains-db
          property: connectionString

databases:
  - name: marketgrains-db
    plan: free
